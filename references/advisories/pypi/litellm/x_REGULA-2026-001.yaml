summary: "Credential-stealing malware in litellm via compromised CI/CD pipeline"
details: |
  After an API token exposure from an exploited Trivy GitHub Actions dependency,
  two new releases of litellm were uploaded to PyPI containing automatically
  activated malware (.pth file), harvesting API keys, SSH keys, cloud credentials,
  and exfiltrating to a remote API (litellm.cloud).
