# Regula Risk Indicators
# EU AI Act classification patterns for AI system risk assessment

ai_indicators:
  python_libraries:
    - tensorflow
    - torch
    - pytorch
    - transformers
    - langchain
    - openai
    - anthropic
    - sklearn
    - scikit-learn
    - xgboost
    - lightgbm
    - keras
    - huggingface
    - spacy
    - nltk
    - onnx
    - onnxruntime
  javascript_libraries:
    - "@tensorflow/tfjs"
    - openai
    - "@anthropic-ai/sdk"
    - langchain
    - "@langchain"
    - brain.js
    - transformers.js
  model_files:
    - .onnx
    - .pt
    - .pth
    - .pkl
    - .joblib
    - .h5
    - .hdf5
    - .safetensors
    - .gguf
    - .ggml
  api_endpoints:
    - api.openai.com
    - api.anthropic.com
    - generativelanguage.googleapis.com
    - api.cohere.ai
    - api.mistral.ai
  ml_patterns:
    - model.fit
    - model.train
    - model.predict
    - embedding
    - vectorstore
    - llm.invoke
    - chat.completions
    - messages.create
    - from_pretrained
    - fine_tune
    - neural_network
    - deep_learning
    - machine_learning

prohibited_patterns:
  subliminal_manipulation:
    article: "5(1)(a)"
    description: "AI deploying subliminal techniques beyond a person's consciousness"
    patterns:
      - subliminal
      - beyond_consciousness
      - subconscious_influence
  exploitation_vulnerabilities:
    article: "5(1)(b)"
    description: "Exploiting vulnerabilities of specific groups"
    patterns:
      - target_elderly
      - exploit_disabil
      - vulnerable_group_target
  social_scoring:
    article: "5(1)(c)"
    description: "Social scoring systems evaluating persons based on social behaviour"
    patterns:
      - social_scor
      - social_credit
      - citizen_score
      - behaviour_scor
  criminal_prediction:
    article: "5(1)(d)"
    description: "Criminal risk prediction based solely on profiling"
    patterns:
      - crime_predict
      - criminal_risk_assess
      - predictive_polic
      - recidivism
  facial_recognition_scraping:
    article: "5(1)(e)"
    description: "Creating facial recognition databases through untargeted scraping"
    patterns:
      - face_scrap
      - facial_database_untarget
      - mass_facial_collect
  emotion_inference_restricted:
    article: "5(1)(f)"
    description: "Emotion inference in workplace or educational settings"
    patterns:
      - "emotion + workplace"
      - "emotion + school"
      - "sentiment + employee"
      - "emotion + employee"
  biometric_categorisation_sensitive:
    article: "5(1)(g)"
    description: "Biometric categorisation inferring sensitive attributes"
    patterns:
      - race_detect
      - ethnicity_infer
      - religion_detect
      - sexual_orientation_infer
      - political_opinion_biometric
  realtime_biometric_public:
    article: "5(1)(h)"
    description: "Real-time remote biometric identification in public spaces"
    patterns:
      - real_time_facial_recogn
      - live_biometric_public
      - public_space_biometric
      - mass_surveillance_biometric

high_risk_patterns:
  biometrics:
    category: "Annex III, Category 1"
    description: "Biometric identification and categorisation"
    articles: [9, 10, 11, 12, 13, 14, 15]
    patterns:
      - biometric_ident
      - face_recogn
      - fingerprint_recogn
      - voice_recogn
  critical_infrastructure:
    category: "Annex III, Category 2"
    description: "Critical infrastructure management"
    articles: [9, 10, 11, 12, 13, 14, 15]
    patterns:
      - energy_grid
      - water_supply
      - traffic_control
      - electricity_manage
  education:
    category: "Annex III, Category 3"
    description: "Education and vocational training"
    articles: [9, 10, 11, 12, 13, 14, 15]
