# Framework Crosswalk: EU AI Act 2024/1689 mapped to 11 frameworks
# Sources: EU AI Act text, NIST AI 100-1, ISO/IEC 42001:2023, NIST CSF 2.0,
#          SOC 2 TSC (AICPA 2017), ISO 27001:2022, OWASP LLM Top 10 (2025),
#          MITRE ATLAS, EU Cyber Resilience Act (2024/2847),
#          ICO AI Guidance (ico.org.uk/for-organisations/uk-gdpr-guidance-and-resources/artificial-intelligence),
#          DSIT AI Principles (gov.uk/government/publications/ai-regulation-a-pro-innovation-approach, updated 2024),
#          Colorado SB 205 (C.R.S. 6-1-1701 et seq., effective 30 Jun 2026),
#          Canada AIDA (Bill C-27, Part 3 — proposed),
#          Singapore Model AI Governance Framework 2.0 + FEAT Principles (MAS/PDPC, 2024),
#          OECD AI Principles (OECD/LEGAL/0449, 2024 update),
#          South Korea AI Basic Act (Act No. 20556, in force 22 Jan 2026)
schema_version: "2.3"
last_updated: "2026-04-11"

mappings:
  article_9:
    eu_ai_act:
      article: "9"
      title: "Risk Management System"
      requirement: "Establish, implement, document and maintain a risk management system"
    nist_ai_rmf:
      functions: ["GOVERN", "MAP", "MANAGE"]
      subcategories:
        - "GOVERN 1.1: Legal and regulatory requirements are identified"
        - "GOVERN 1.2: Trustworthy AI characteristics are integrated into organizational policies"
        - "GOVERN 1.3: Processes for human oversight are defined"
        - "GOVERN 1.4: Risk management process is established and followed"
        - "GOVERN 1.5: Processes for ongoing monitoring are in place"
        - "GOVERN 1.6: Risk tolerances and priorities are defined"
        - "GOVERN 1.7: Processes and procedures are in place to decommission an AI system"
        - "MAP 1.1: Intended purposes, context of use, deployment are understood"
        - "MAP 1.2: Interdisciplinary AI actors, competencies, skills, and capacities for AI are documented"
        - "MAP 1.3: Risks and benefits of AI are considered for potentially impacted individuals and communities"
        - "MAP 1.4: Risks and benefits of third-party AI resources are assessed"
        - "MAP 1.5: Assumptions and limitations are documented"
        - "MAP 1.6: System requirements are defined"
        - "MAP 5.1: Likelihood and magnitude of each identified AI risk is assessed"
        - "MAP 5.2: Practices for defining, documenting, and managing AI risk are in place"
        - "MANAGE 1.1: A determination is made as to whether the AI risk is manageable"
        - "MANAGE 1.2: Treatment of risks is prioritized and acted upon"
        - "MANAGE 1.3: Responses to identified AI risks are developed"
        - "MANAGE 1.4: Residual risk is documented and communicated"
        - "MANAGE 2.1: Resources required to manage AI risks are taken into account"
        - "MANAGE 2.2: Mechanisms are in place for human oversight of deployed AI"
        - "MANAGE 2.3: Procedures are followed to respond to AI incidents"
        - "MANAGE 2.4: Mechanisms are in place to address AI risks"
      notes: "NIST AI RMF Critical Infrastructure Profile (April 2026) adds sector-specific overlays for risk management in critical infrastructure AI systems."
    iso_42001:
      controls:
        - "6.1: Actions to address risks and opportunities"
        - "A.5.3: AI risk management"
        - "A.6.1: AI risk assessment"
    nist_csf:
      functions: ["GOVERN", "IDENTIFY"]
      subcategories:
        - "GV.RM-01: Risk management objectives are established and agreed upon"
        - "GV.RM-02: Risk appetite and tolerance statements are established and communicated"
        - "GV.RM-07: Strategic opportunities (positive risks) are identified and included in risk discussions"
        - "ID.RA-01: Vulnerabilities in assets are identified, validated, and recorded"
        - "ID.RA-02: Cyber threat intelligence is received from information sharing forums"
        - "ID.RA-03: Internal and external threats are identified and recorded"
    soc2:
      criteria:
        - "CC3.1: Management identifies and assesses risks to the achievement of objectives"
        - "CC3.2: Management considers the potential for fraud when assessing risks"
        - "CC3.4: Management identifies and assesses changes that could significantly affect the system of internal control"
    iso_27001:
      controls:
        - "5.1: Policies for information security"
        - "6.1: Actions to address risks and opportunities"
        - "6.1.2: Information security risk assessment"
        - "6.1.3: Information security risk treatment"
    owasp_llm_top10:
      items: []
    mitre_atlas:
      techniques:
        - "AML.T0031: Erode ML Model Integrity"
        - "AML.T0043: Craft Adversarial Data"
        - "AML.T0047: Evade ML Model"
    lgpd:
      articles:
        - "Art. 6 (prevenção): Sistema de prevenção de danos ao titular"
        - "Art. 38: Relatório de Impacto à Proteção de Dados (RIPD) para tratamentos de risco"
      notes: "O sistema de gestão de riscos da IA deve cobrir riscos ao titular dos dados pessoais."
    marco_legal_ia:
      status: "Projeto de lei — aprovado pelo Senado em dezembro/2024, em tramitação na Câmara"
      articles:
        - "Art. 12: Avaliação preliminar do grau de risco antes da introdução no mercado"
        - "Art. 13: Usos vedados (risco excessivo) — proibição absoluta"
        - "Art. 14: Definição de sistemas de IA de alto risco"
      notes: "Sistemas de IA de alto risco requerem avaliação prévia de riscos (Art. 12) e conformidade com as categorias de alto risco (Art. 14)."
    cra:
      regulation: "EU Cyber Resilience Act (2024/2847)"
      requirements:
        - "Annex I, Part I (2): Products shall be designed with appropriate level of cybersecurity based on risks"
        - "Art. 13: Obligations of manufacturers — cybersecurity risk assessment before placing on market"
      notes: "CRA risk assessment overlaps with AI Act Art. 9 — both require pre-market risk identification. CRA focuses on cybersecurity risks; AI Act on fundamental rights risks."
    ico_ai:
      source: "ICO AI Auditing Framework + DSIT 5 cross-sectoral principles (non-statutory, April 2026)"
      principles:
        - "DSIT Principle 1 — Safety, security and robustness: Risk management processes must identify and mitigate foreseeable harms before deployment"
        - "DSIT Principle 5 — Accountability and governance: Organisations must implement appropriate governance structures and assign clear accountability for AI risk"
        - "ICO Accountability (Art. 5(2) UK GDPR): Demonstrate compliance with data protection obligations in AI system design"
      notes: "UK has no statutory AI Act as of April 2026. ICO guidance and DSIT principles are non-binding but represent regulatory expectation. ICO enforcement via UK GDPR remains binding."

  article_10:
    eu_ai_act:
      article: "10"
      title: "Data and Data Governance"
      requirement: "Training, validation and testing data sets shall be subject to appropriate data governance"
    nist_ai_rmf:
      functions: ["MAP", "MEASURE", "GOVERN"]
      subcategories:
        - "MAP 2.1: The specific tasks and methods for the AI system are defined"
        - "MAP 2.2: Information about the AI systems knowledge limits is documented"
        - "MAP 2.3: Scientific integrity and TEVV considerations are identified"
        - "MEASURE 2.1: Test sets, metrics, and methodologies for AI measurement are identified"
        - "MEASURE 2.2: Evaluations involving human subjects meet ethics requirements"
        - "MEASURE 2.3: AI system performance or assurance criteria are measured qualitatively or quantitatively"
        - "MEASURE 2.4: The functionality and behavior of the AI system is monitored"
        - "MEASURE 2.5: AI system is evaluated for runtime monitoring"
        - "MEASURE 2.6: AI system performance or assurance criteria are measured"
        - "GOVERN 1.5: Processes for ongoing monitoring are in place"
        - "GOVERN 1.6: Risk tolerances and priorities are defined"
        - "GOVERN 1.7: Processes and procedures are in place to decommission an AI system"
    iso_42001:
      controls:
        - "A.6.6: Data for AI systems"
        - "A.7.4: Documentation of data"
    nist_csf:
      functions: ["IDENTIFY", "PROTECT"]
      subcategories:
        - "ID.AM-07: Inventories of data and corresponding metadata are maintained"
        - "ID.AM-08: Systems, hardware, software, services, and data are managed throughout their life cycles"
        - "PR.DS-01: The confidentiality, integrity, and availability of data-at-rest are protected"
        - "PR.DS-02: The confidentiality, integrity, and availability of data-in-transit are protected"
    soc2:
      criteria:
        - "CC6.1: Logical and physical access controls restrict access to information assets"
        - "PI1.1: Processing integrity policies and procedures are established"
        - "C1.1: Confidential information is identified and maintained"
    iso_27001:
      controls:
        - "A.5.12: Classification of information"
        - "A.5.13: Labelling of information"
        - "A.8.10: Information deletion"
        - "A.8.11: Data masking"
    owasp_llm_top10:
      items:
        - "LLM02: Sensitive Information Disclosure"
        - "LLM04: Data and Model Poisoning"
        - "LLM08: Vector and Embedding Weaknesses"
    mitre_atlas:
      techniques:
        - "AML.T0018: Backdoor ML Model"
        - "AML.T0019: Publish Poisoned Datasets"
        - "AML.T0020: Poison Training Data"
        - "AML.T0043: Craft Adversarial Data"
    lgpd:
      articles:
        - "Art. 6 (qualidade): Dados devem ser exatos, claros, relevantes e atualizados"
        - "Art. 7: Base legal para tratamento de dados pessoais"
        - "Art. 11: Tratamento de dados pessoais sensíveis (incluindo dados biométricos)"
      notes: "Governança de dados de treinamento deve respeitar as bases legais da LGPD."
    marco_legal_ia:
      status: "Projeto de lei — aprovado pelo Senado em dezembro/2024, em tramitação na Câmara"
      articles:
        - "Art. 18, I(a): Documentação adequada de todas as etapas do ciclo de vida do sistema"
        - "Art. 14, III: Sistemas de alto risco incluem recrutamento e gestão de trabalhadores com dados sensíveis"
      notes: "Dados de treinamento de IA de alto risco sujeitos a requisitos de documentação (Art. 18)."
    cra:
      regulation: "EU Cyber Resilience Act (2024/2847)"
      requirements:
        - "Annex I, Part I (2)(d): Protect confidentiality and integrity of stored, transmitted or processed data"
      notes: "CRA data protection requirements complement AI Act Art. 10 data governance — CRA covers data-in-transit/at-rest security."
    ico_ai:
      source: "ICO AI Auditing Framework + UK GDPR data minimisation principles (non-statutory, April 2026)"
      principles:
        - "ICO Data minimisation (Art. 5(1)(c) UK GDPR): Only personal data adequate, relevant and limited to what is necessary"
        - "ICO Storage limitation (Art. 5(1)(e) UK GDPR): Data not kept longer than necessary for training or evaluation"
        - "ICO Accuracy (Art. 5(1)(d) UK GDPR): Training data should be accurate and kept up to date"
        - "DSIT Principle 3 — Fairness: Training data governance must include bias assessment and representation checks"
      notes: "ICO expects organisations using personal data in AI training to conduct DPIAs. ICO 'Explaining decisions made with AI' guidance applies when outputs affect individuals."

  article_11:
    eu_ai_act:
      article: "11"
      title: "Technical Documentation"
      requirement: "Technical documentation shall be drawn up before the system is placed on the market"
    nist_ai_rmf:
      functions: ["GOVERN", "MAP"]
      subcategories:
        - "MAP 1.1: Intended purposes, context of use, deployment are understood"
        - "MAP 1.2: Interdisciplinary AI actors, competencies, skills, and capacities for AI are documented"
        - "MAP 1.3: Risks and benefits of AI are considered for potentially impacted individuals and communities"
        - "MAP 1.4: Risks and benefits of third-party AI resources are assessed"
        - "MAP 1.5: Assumptions and limitations are documented"
        - "MAP 1.6: System requirements are defined"
        - "MAP 3.1: Approaches for mapping AI risks are established"
        - "MAP 3.2: AI system capabilities are documented"
        - "MAP 3.3: Processes for data governance are established"
        - "MAP 3.4: Measurable performance objectives are established"
        - "MAP 3.5: Processes to document risks and risk responses are established"
        - "GOVERN 4.1: Organizational practices are in place for transparency"
        - "GOVERN 4.2: Organizational practices are in place for documentation"
        - "GOVERN 4.3: Organizational practices for collecting, reporting, and sharing information are in place"
    iso_42001:
      controls:
        - "A.6.4: AI system documentation"
        - "7.5: Documented information"
    nist_csf:
      functions: ["GOVERN", "IDENTIFY"]
      subcategories:
        - "GV.PO-01: A policy for managing cybersecurity risks is established based on organizational context"
        - "ID.AM-01: Inventories of hardware managed by the organization are maintained"
        - "ID.AM-02: Inventories of software, services, and systems managed by the organization are maintained"
    soc2:
      criteria:
        - "CC2.1: Information regarding the design and operation of controls is communicated to internal and external users"
        - "CC2.2: Internal communications include information about objectives, responsibilities, and changes"
    iso_27001:
      controls:
        - "7.5.1: Documented information — general"
        - "7.5.2: Creating and updating documented information"
        - "7.5.3: Control of documented information"
        - "A.5.37: Documented operating procedures"
    owasp_llm_top10:
      items: []
    mitre_atlas:
      techniques: []
    lgpd:
      articles:
        - "Art. 38: Relatório de Impacto à Proteção de Dados (RIPD) como documentação técnica"
        - "Art. 6 (responsabilização): Comprovação de conformidade com medidas adotadas"
      notes: "O RIPD (Art. 38) serve como documentação técnica para sistemas de IA que tratam dados pessoais."
    marco_legal_ia:
      status: "Projeto de lei — aprovado pelo Senado em dezembro/2024, em tramitação na Câmara"
      articles:
        - "Art. 18, I(a): Documentação técnica obrigatória para sistemas de IA de alto risco"
        - "Art. 18, II(a): Desenvolvedor deve manter registros das medidas de governança adotadas"
      notes: "Documentação técnica deve ser mantida e disponibilizada à autoridade competente (Art. 18)."
    cra:
      regulation: "EU Cyber Resilience Act (2024/2847)"
      requirements:
        - "Art. 13: Technical documentation shall include cybersecurity risk assessment"
        - "Art. 13(8): Technical documentation and declaration of conformity kept for at least 10 years"
      notes: "CRA requires technical documentation for all products with digital elements — overlaps with AI Act Art. 11 for AI-enabled products."
    ico_ai:
      source: "ICO AI Auditing Framework — accountability documentation (non-statutory, April 2026)"
      principles:
        - "DSIT Principle 5 — Accountability and governance: Document AI system design, data sources and intended purpose"
        - "ICO Accountability (Art. 5(2) UK GDPR): Maintain records of processing activities where AI processes personal data"
        - "ICO DPIA requirement: High-risk AI processing personal data requires a DPIA before deployment"
      notes: "ICO 'Accountability and governance' guidance requires documentation of AI system purpose, risks, and mitigations. Not equivalent to Annex IV but aligns in intent."

  article_12:
    eu_ai_act:
      article: "12"
      title: "Record-Keeping"
      requirement: "High-risk AI systems shall technically allow for automatic recording of events"
    nist_ai_rmf:
      functions: ["MEASURE", "MANAGE", "GOVERN"]
      subcategories:
        - "MEASURE 2.7: AI system evaluations are logged and documented"
        - "MEASURE 2.8: Measurement results are logged"
        - "MEASURE 2.9: AI model performance in production is monitored"
        - "MEASURE 2.10: AI system privacy risk is examined and documented"
        - "MEASURE 2.11: Fairness and bias as identified in MAP are evaluated"
        - "MEASURE 2.12: Environmental impact of AI model training and usage is assessed"
        - "MEASURE 2.13: Effectiveness of measurement approaches is evaluated regularly"
        - "MANAGE 3.1: AI risks and benefits from third-party resources are regularly monitored"
        - "MANAGE 3.2: Pre-defined risk response plans are executed when trigger conditions are met"
        - "GOVERN 6.1: Policies and procedures exist for the collection, retention, and disposition of AI-related data"
        - "GOVERN 6.2: AI risk management information is shared with relevant parties"
    iso_42001:
      controls:
        - "A.6.10: Logging and monitoring"
    nist_csf:
      functions: ["DETECT", "IDENTIFY"]
      subcategories:
        - "DE.CM-01: Networks and network services are monitored to find potentially adverse events"
        - "DE.CM-06: External service provider activities and services are monitored"
        - "DE.CM-09: Computing hardware and software, runtime environments, and their data are monitored"
    soc2:
      criteria:
        - "CC7.1: To meet its objectives, the entity uses detection and monitoring procedures"
        - "CC7.2: The entity monitors system components and the operation of those components for anomalies"
    iso_27001:
      controls:
        - "A.8.15: Logging"
        - "A.8.16: Monitoring activities"
        - "A.8.17: Clock synchronization"
    owasp_llm_top10:
      items: []
    mitre_atlas:
      techniques: []
    lgpd:
      articles:
        - "Art. 6 (responsabilização): Demonstração do cumprimento das normas de proteção de dados"
        - "Art. 37: Registro das operações de tratamento de dados pessoais"
      notes: "Registros de auditoria de sistemas de IA apoiam a prestação de contas exigida pela LGPD."
    marco_legal_ia:
      status: "Projeto de lei — aprovado pelo Senado em dezembro/2024, em tramitação na Câmara"
      articles:
        - "Art. 18, I(b): Ferramentas de registro para avaliação de acurácia e robustez do sistema"
        - "Art. 18, II(a): Desenvolvedor mantém registros das medidas de governança para prestação de contas"
      notes: "Registros de funcionamento são requisito para sistemas de alto risco (Art. 18)."
    cra:
      regulation: "EU Cyber Resilience Act (2024/2847)"
      requirements:
        - "Annex I, Part I (2)(g): Record and monitor relevant internal activity, including data access"
        - "Art. 14(2)(a): Actively exploited vulnerability notification within 24 hours"
      notes: "CRA logging requirements overlap with AI Act Art. 12 — CRA adds mandatory vulnerability reporting timelines."
    ico_ai:
      source: "ICO AI Auditing Framework — audit trail and accountability logging (non-statutory, April 2026)"
      principles:
        - "ICO Accountability (Art. 5(2) UK GDPR): Maintain records sufficient to demonstrate compliance with data protection principles"
        - "DSIT Principle 5 — Accountability and governance: Audit logs support post-incident review and regulatory enquiry"
        - "ICO 'Explaining decisions made with AI': Organisations should retain logs to explain automated decisions affecting individuals"
      notes: "UK has no mandatory AI logging obligation equivalent to Art. 12, but ICO expects records sufficient for accountability demonstrations under UK GDPR."

  article_13:
    eu_ai_act:
      article: "13"
      title: "Transparency and Provision of Information to Deployers"
      requirement: "High-risk AI systems shall be designed to ensure their operation is sufficiently transparent"
    nist_ai_rmf:
      functions: ["GOVERN", "MAP", "MEASURE"]
      subcategories:
        - "MAP 3.1: Approaches for mapping AI risks are established"
        - "MAP 3.2: AI system capabilities are documented"
        - "MAP 3.3: Processes for data governance are established"
        - "MAP 3.4: Measurable performance objectives are established"
        - "MAP 3.5: Processes to document risks and risk responses are established"
        - "GOVERN 5.1: Organizational policies and practices are in place for robust engagement with relevant AI actors"
        - "GOVERN 5.2: Mechanisms are established for the public to report AI concerns"
        - "MEASURE 3.1: Approaches for internal and external AI risk monitoring are established"
        - "MEASURE 3.2: Risk-tracking mechanisms are utilized to capture emergent risks"
        - "MEASURE 3.3: Feedback from affected communities and individuals is integrated"
    iso_42001:
      controls:
        - "A.6.8: Transparency and explainability"
    nist_csf:
      functions: ["GOVERN"]
      subcategories:
        - "GV.PO-02: Policy for managing cybersecurity risks is reviewed, updated, communicated, and enforced"
        - "GV.SC-03: Cybersecurity supply chain risk management activities are integrated into cybersecurity and enterprise risk management"
    soc2:
      criteria:
        - "CC2.1: Information regarding the design and operation of controls is communicated to internal and external users"
        - "CC2.3: External communications include information about objectives, responsibilities, and changes"
    iso_27001:
      controls:
        - "7.4: Communication"
        - "A.5.31: Legal, statutory, regulatory, and contractual requirements"
    owasp_llm_top10:
      items:
        - "LLM01: Prompt Injection"
        - "LLM05: Improper Output Handling"
        - "LLM07: System Prompt Leakage"
        - "LLM09: Misinformation"
    mitre_atlas:
      techniques:
        - "AML.T0040: ML Model Inference API Access"
        - "AML.T0048: Prompt Injection"
    lgpd:
      articles:
        - "Art. 6 (transparência): Informações claras e adequadas sobre o tratamento"
        - "Art. 18, I: Direito do titular à confirmação da existência de tratamento"
        - "Art. 18, II: Direito do titular ao acesso aos dados"
        - "Art. 20: Direito à revisão de decisões automatizadas e à informação sobre critérios utilizados"
      notes: "A transparência exigida pelo Art. 13 da Lei IA europeia complementa os direitos do titular da LGPD."
    marco_legal_ia:
      status: "Projeto de lei — aprovado pelo Senado em dezembro/2024, em tramitação na Câmara"
      articles:
        - "Art. 5, I: Direito à informação sobre interações com sistemas de IA e caráter automatizado"
        - "Art. 6, II: Explicações sobre decisões automatizadas de alto impacto"
        - "Art. 18, I(f): Disponibilização de informações que permitam interpretar resultados do sistema"
      notes: "Usuários têm direito de saber quando interagem com um sistema de IA (Art. 5) e de receber explicações (Art. 6)."
    cra:
      regulation: "EU Cyber Resilience Act (2024/2847)"
      requirements:
        - "Annex II: Information and instructions to the user, including security properties"
        - "Art. 13(1): Products placed on market shall comply with Annex I essential requirements"
      notes: "CRA transparency obligations complement AI Act Art. 13 — CRA covers cybersecurity disclosures to users."
    ico_ai:
      source: "ICO 'Explaining decisions made with AI' guidance + DSIT principles (non-statutory, April 2026)"
      principles:
        - "DSIT Principle 2 — Appropriate transparency and explainability: Users should understand when AI is involved in decisions and how it works"
        - "ICO 'Explaining decisions made with AI': Meaningful information about AI-driven decisions must be provided to individuals"
        - "ICO Right to explanation (Art. 22 UK GDPR): Where solely automated decisions produce legal/significant effects, individuals have rights to explanation and human review"
      notes: "ICO guidance distinguishes between transparency to deployers (Art. 13) and to individuals affected (Art. 14 UK GDPR right to explanation). Both apply where AI processes personal data."

  article_14:
    eu_ai_act:
      article: "14"
      title: "Human Oversight"
      requirement: "High-risk AI systems shall be designed so they can be effectively overseen by natural persons"
    nist_ai_rmf:
      functions: ["GOVERN", "MAP", "MANAGE"]
      subcategories:
        - "GOVERN 1.3: Processes for human oversight are defined"
        - "MAP 4.1: Approaches for mapping AI risks in deployment contexts are identified"
        - "MAP 4.2: AI risks are assessed in real-world conditions"
        - "MANAGE 4.1: Post-deployment monitoring plans are in place"
        - "MANAGE 4.2: Mechanisms are in place to sustain the value of AI systems"
    iso_42001:
      controls:
        - "A.6.3: Human oversight of AI systems"
    nist_csf:
      functions: ["GOVERN", "RESPOND"]
      subcategories:
        - "GV.RR-01: Organizational leadership takes responsibility for decisions associated with cybersecurity risks"
        - "RS.MA-01: The incident response plan is executed in coordination with relevant third parties"
        - "RS.MA-05: The criteria for initiating incident recovery are applied"
    soc2:
      criteria:
        - "CC1.1: The entity demonstrates a commitment to integrity and ethical values"
        - "CC1.3: Management establishes, with board oversight, structures, reporting lines, and appropriate authorities"
    iso_27001:
      controls:
        - "5.3: Organizational roles, responsibilities, and authorities"
        - "A.5.8: Information security in project management"
        - "A.6.4: Disciplinary process"
    owasp_llm_top10:
      items:
        - "LLM05: Improper Output Handling"
        - "LLM06: Excessive Agency"
    mitre_atlas:
      techniques: []
    lgpd:
      articles:
        - "Art. 20: O titular tem direito a solicitar revisão de decisões tomadas unicamente com base em tratamento automatizado"
        - "Art. 20, §1: O controlador deve fornecer informações claras e adequadas sobre os critérios utilizados"
      notes: "O direito de revisão humana do Art. 20 da LGPD é o equivalente mais direto ao Art. 14 da Lei IA europeia."
    marco_legal_ia:
      status: "Projeto de lei — aprovado pelo Senado em dezembro/2024, em tramitação na Câmara"
      articles:
        - "Art. 8: Supervisão humana de sistemas de IA de alto risco — compreender, interpretar, decidir e intervir"
        - "Art. 6, III: Direito à revisão humana de decisões automatizadas de alto impacto"
      notes: "Sistemas de IA de alto risco devem permitir intervenção humana significativa (Art. 8)."
    cra:
      regulation: "EU Cyber Resilience Act (2024/2847)"
      requirements:
        - "Annex I, Part II (1): Manufacturers shall identify and document vulnerabilities, including third-party components"
      notes: "CRA does not directly address human oversight, but vulnerability management processes require human decision-making on patch prioritisation."
    ico_ai:
      source: "ICO AI Auditing Framework — human review and contestability (non-statutory, April 2026)"
      principles:
        - "DSIT Principle 5 — Contestability and redress: Individuals should be able to challenge AI decisions; appropriate mechanisms must exist"
        - "ICO Art. 22 UK GDPR: Solely automated decisions with legal/significant effects require human review mechanism on request"
        - "ICO 'Explaining decisions made with AI': Human review processes must be meaningful, not a rubber-stamp"
      notes: "ICO has issued enforcement notices against solely automated decision-making without adequate human review. This is an active enforcement area, not aspirational guidance."

  article_15:
    eu_ai_act:
      article: "15"
      title: "Accuracy, Robustness and Cybersecurity"
      requirement: "High-risk AI systems shall be designed to achieve an appropriate level of accuracy, robustness and cybersecurity"
    nist_ai_rmf:
      functions: ["MEASURE", "MANAGE"]
      subcategories:
        - "MEASURE 1.1: Approaches for measurement of AI risks are documented"
        - "MEASURE 1.2: Appropriateness of AI metrics and effectiveness of measurement are evaluated"
        - "MEASURE 1.3: Internal and external processes for measurement are documented"
        - "MEASURE 2.1: Test sets, metrics, and methodologies for AI measurement are identified"
        - "MEASURE 2.2: Evaluations involving human subjects meet ethics requirements"
        - "MEASURE 2.3: AI system performance or assurance criteria are measured qualitatively or quantitatively"
        - "MEASURE 2.4: The functionality and behavior of the AI system is monitored"
        - "MEASURE 2.5: AI system is evaluated for runtime monitoring"
        - "MEASURE 2.6: AI system performance or assurance criteria are measured"
        - "MANAGE 1.1: A determination is made as to whether the AI risk is manageable"
        - "MANAGE 1.2: Treatment of risks is prioritized and acted upon"
        - "MANAGE 1.3: Responses to identified AI risks are developed"
        - "MANAGE 1.4: Residual risk is documented and communicated"
      notes: "NIST AI RMF Critical Infrastructure Profile (April 2026) adds sector-specific measurement and resilience requirements for AI in critical infrastructure."
    iso_42001:
      controls:
        - "A.6.9: Performance and monitoring"
        - "A.8.1: Cybersecurity for AI"
    nist_csf:
      functions: ["PROTECT", "DETECT", "RECOVER"]
      subcategories:
        - "PR.PS-01: Configuration management practices are established and applied"
        - "PR.PS-06: Secure software development practices are integrated, and their performance is monitored"
        - "PR.IR-01: Networks and environments are protected from unauthorized logical access and usage"
        - "DE.AE-02: Potentially adverse events are analyzed to better understand associated activities"
        - "RC.RP-01: The recovery portion of the incident response plan is executed once initiated"
    soc2:
      criteria:
        - "CC6.1: Logical and physical access controls restrict access to information assets"
        - "CC6.6: Security events are evaluated to determine whether they represent failures in controls"
        - "CC6.8: Measures to prevent or detect and act upon the introduction of unauthorized or malicious software"
        - "CC8.1: Change management processes ensure authorized, tested, and approved changes"
        - "A1.2: Environmental protections, software, data backup processes, and recovery infrastructure"
    iso_27001:
      controls:
        - "A.8.8: Management of technical vulnerabilities"
        - "A.8.9: Configuration management"
        - "A.8.12: Data leakage prevention"
        - "A.8.23: Web filtering"
        - "A.8.24: Use of cryptography"
        - "A.8.25: Secure development life cycle"
        - "A.8.26: Application security requirements"
        - "A.8.28: Secure coding"
    owasp_llm_top10:
      items:
        - "LLM01: Prompt Injection"
        - "LLM02: Sensitive Information Disclosure"
        - "LLM03: Supply Chain Vulnerabilities"
        - "LLM04: Data and Model Poisoning"
        - "LLM05: Improper Output Handling"
        - "LLM07: System Prompt Leakage"
        - "LLM08: Vector and Embedding Weaknesses"
        - "LLM09: Misinformation"
        - "LLM10: Unbounded Consumption"
    mitre_atlas:
      techniques:
        - "AML.T0010: ML Supply Chain Compromise"
        - "AML.T0018: Backdoor ML Model"
        - "AML.T0031: Erode ML Model Integrity"
        - "AML.T0040: ML Model Inference API Access"
        - "AML.T0043: Craft Adversarial Data"
        - "AML.T0047: Evade ML Model"
        - "AML.T0048: Prompt Injection"
    lgpd:
      articles:
        - "Art. 6 (qualidade): Dados utilizados devem ser exatos e atualizados"
        - "Art. 6 (segurança): Medidas técnicas e administrativas para proteger os dados"
        - "Art. 46: Medidas de segurança, técnicas e administrativas para proteção dos dados pessoais"
      notes: "Requisitos de segurança e precisão do sistema de IA devem incluir proteção dos dados pessoais processados."
    marco_legal_ia:
      status: "Projeto de lei — aprovado pelo Senado em dezembro/2024, em tramitação na Câmara"
      articles:
        - "Art. 3, VIII: Princípio de confiabilidade e robustez do sistema de IA"
        - "Art. 18, I(b–c): Avaliação de acurácia, robustez e testes de segurança para sistemas de alto risco"
      notes: "Requisitos técnicos de segurança e robustez são exigidos pelo Art. 18 para sistemas de alto risco."
    cra:
      regulation: "EU Cyber Resilience Act (2024/2847)"
      requirements:
        - "Annex I, Part I (2)(a): Products shall be designed with no known exploitable vulnerabilities"
        - "Annex I, Part I (2)(b): Secure by default configuration"
        - "Annex I, Part I (2)(c): Protect against unauthorised access by appropriate control mechanisms"
        - "Annex I, Part II (1): Identify and document vulnerabilities including SBOM"
        - "Annex I, Part II (3): Apply effective and regular tests and reviews"
        - "Art. 14(2): Report actively exploited vulnerabilities within 24 hours to ENISA"
      notes: "Art. 15 (cybersecurity) is where AI Act and CRA overlap most directly. Both require products to be resilient against attacks. CRA adds mandatory SBOM, vulnerability disclosure, and 5-year security update obligations."
    ico_ai:
      source: "ICO AI Auditing Framework — accuracy and security (non-statutory, April 2026)"
      principles:
        - "DSIT Principle 1 — Safety, security and robustness: AI systems must be technically secure and perform reliably across foreseeable contexts"
        - "ICO Accuracy (Art. 5(1)(d) UK GDPR): AI outputs used in decisions about individuals must be accurate; inaccurate outputs that lead to wrong decisions may breach UK GDPR"
        - "ICO Security (Art. 5(1)(f) UK GDPR): Appropriate technical and organisational measures required to protect against unauthorised processing and accidental loss"
        - "DSIT Principle 3 — Fairness: Accuracy requirements include ensuring outputs do not systematically disadvantage protected groups"
      notes: "ICO has powers to issue enforcement notices and fines under UK GDPR for accuracy failures in automated systems. Accuracy obligation is binding, not aspirational."

# ---------------------------------------------------------------------------
# NIST AI 600-1 — Generative AI Profile (July 2024)
# ---------------------------------------------------------------------------
# 12 risks unique to or exacerbated by generative AI, mapped to the EU AI Act
# articles where they create obligations. This is a SEPARATE top-level section
# from `mappings:` because the NIST GenAI risks are not 1:1 with EU AI Act
# articles — each risk maps to multiple articles, and each article touches
# multiple risks.
#
# Source: NIST.AI.600-1, "Artificial Intelligence Risk Management Framework:
#         Generative Artificial Intelligence Profile", July 2024
# URL: https://airc.nist.gov/docs/NIST.AI.600-1.GenAI-Profile.ipd.pdf
# Authority: NIST (US National Institute of Standards and Technology)
#
nist_ai_600_1_genai_profile:
  source: "NIST AI 600-1 (July 2024)"
  url: "https://airc.nist.gov/docs/NIST.AI.600-1.GenAI-Profile.ipd.pdf"
  description: "12 risks unique to or exacerbated by generative AI, with mapping to EU AI Act articles where each risk creates an obligation."
  risks:
    - id: cbrn
      name: "CBRN Information or Capabilities"
      description: "GenAI may lower barriers to chemical, biological, radiological, and nuclear threat information."
      maps_to_eu_ai_act_articles: ["9", "15"]
    - id: confabulation
      name: "Confabulation"
      description: "Confidently stated but false or internally inconsistent outputs (hallucinations)."
      maps_to_eu_ai_act_articles: ["13", "14", "15"]
    - id: dangerous_violent_hateful
      name: "Dangerous, Violent, or Hateful Content"
      description: "Generation of content that promotes or incites violence, hatred, or harm."
      maps_to_eu_ai_act_articles: ["9", "15"]
    - id: data_privacy
      name: "Data Privacy"
      description: "Models may leak, generate, or infer sensitive information about individuals (data memorization)."
      maps_to_eu_ai_act_articles: ["10", "15"]
    - id: environmental_impacts
      name: "Environmental Impacts"
      description: "Energy consumption and carbon emissions of training and serving large generative models."
      maps_to_eu_ai_act_articles: ["9"]
      notes: "EU AI Act has limited explicit environmental obligations; NIST profile flags this as a gap."
    - id: harmful_bias_homogenization
      name: "Harmful Bias or Homogenization"
      description: "GenAI outputs may amplify training-data bias or homogenize cultural and stylistic diversity."
      maps_to_eu_ai_act_articles: ["10"]
    - id: human_ai_configuration
      name: "Human-AI Configuration"
      description: "Misalignment of human roles with AI capabilities, including over-reliance and under-reliance."
      maps_to_eu_ai_act_articles: ["13", "14"]
    - id: information_integrity
      name: "Information Integrity"
      description: "Risks to information ecosystems including misinformation and synthetic media."
      maps_to_eu_ai_act_articles: ["10", "13", "50"]
    - id: information_security
      name: "Information Security"
      description: "Adversarial attacks (prompt injection, model extraction, data poisoning) on GenAI systems."
      maps_to_eu_ai_act_articles: ["12", "15"]
    - id: intellectual_property
      name: "Intellectual Property"
      description: "Training data may include copyrighted material; outputs may reproduce or derive from it."
      maps_to_eu_ai_act_articles: ["10", "53"]
      notes: "Article 53(1)(c) requires GPAI providers to publish a copyright policy."
    - id: obscene_degrading_abusive
      name: "Obscene, Degrading, and/or Abusive Content"
      description: "Generation of CSAM, non-consensual intimate imagery, and abusive content."
      maps_to_eu_ai_act_articles: ["5", "15"]
      notes: "Digital Omnibus (March 2026) introduces new prohibition on non-consensual intimate deepfakes."
    - id: value_chain_component_integration
      name: "Value Chain and Component Integration"
      description: "Risks introduced when integrating third-party models, datasets, and APIs into a system."
      maps_to_eu_ai_act_articles: ["11", "16"]
      notes: "Maps to Annex IV technical documentation requirements for component provenance."
