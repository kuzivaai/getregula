version: "1.0"
organisation: "Your Organisation"

frameworks:
  - eu_ai_act
  # - iso_42001      # Future
  # - nist_ai_rmf    # Future

rules:
  risk_classification:
    force_high_risk: []      # Systems to always treat as high-risk
    exempt: []               # Systems confirmed as low-risk

  approvals:
    high_risk:
      required: true
      approvers: ["dpo@company.com"]
      timeout_hours: 72

  blocking:
    prohibited: []           # Additional patterns to block
    require_approval: []     # Patterns requiring approval

  logging:
    retention_years: 10
    pii_redaction: true
    export_format: [json, pdf]
